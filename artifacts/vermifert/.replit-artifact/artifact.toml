kind = "web"
previewPath = "/"
title = "متجر سماد الديدان"
version = "1.0.0"
id = "artifacts/vermifert"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20617

[services.development]
run = "pnpm --filter @workspace/vermifert run dev"

[services.production.run]
args = ["pnpm", "--filter", "@workspace/vermifert", "run", "serve"]

[services.production.run.env]
PORT = "20617"
BASE_PATH = "/"
NODE_ENV = "production"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20617"
BASE_PATH = "/"

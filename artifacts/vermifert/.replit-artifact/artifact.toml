kind = "web"
previewPath = "/"
title = "متجر سماد الديدان"
version = "1.0.0"
id = "artifacts/vermifert"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20617

[services.development]
run = "pnpm --filter @workspace/vermifert run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vermifert", "run", "build" ]
publicDir = "artifacts/vermifert/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20617"
BASE_PATH = "/"
